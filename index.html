<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>اختبار الاتصال</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .fail {
      color: red;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>اختبار الاتصال</h2>

    <button onclick="check()">ابدأ الاختبار</button>

    <div id="result"></div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQy9Hucr-a3xr7ovYv3lnPgmPuXr7kY9YcTvfaW1M1uu_OacPWe0Q2qipSnr-KyoFGSKvbXf1n6FYlV/pub?gid=0&single=true&output=csv";

    async function check() {
      let result = document.getElementById("result");

      result.innerHTML = "جاري اختبار الاتصال...";
      result.className = "";

      try {
        let response = await fetch(sheetURL, { cache: "no-store" });
        let data = await response.text();

        if(data && data.length > 0){
          result.innerHTML = "✅ الداتا وصلت بنجاح";
          result.className = "success";
          console.log(data);
        } else {
          result.innerHTML = "❌ الداتا فاضية";
          result.className = "fail";
        }

      } catch (e) {
        result.innerHTML = "❌ مفيش اتصال خالص";
        result.className = "fail";
        console.log(e);
      }
    }
  </script>

</body>
</html>
