<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>التحقق من المنصة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      animation: fade 0.4s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success { color: green; }
    .fail { color: red; }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #777;
      line-height: 1.6;
    }

    .footer a{
      display:block;
      margin-top:5px;
      color:#25D366;
      font-weight:bold;
      text-decoration:none;
    }

    .footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>التحقق من المنصة</h2>

  <input type="text" id="code" placeholder="ادخل كود الطالب">
  <br>
  <button onclick="check()">تحقق</button>

  <div id="result"></div>

  <div class="footer">
    هذا الموقع لا يمت بأي صلة إلى وزارة التعليم أو أي جهة حكومية.<br>
    تم تصميمه وتطويره بواسطة: Ahmed Khaled<br>
    © 2026 - All Rights Reserved<br><br>

    📞 للتواصل عبر واتساب:<br>

    <a href="https://wa.me/201014083899" target="_blank">01014083899</a>
    <a href="https://wa.me/201096715943" target="_blank">01096715943</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAt6ctdyQgA6yTO6QZGYyCZltO-ZTMEU5w",
  authDomain: "platform-499ca.firebaseapp.com",
  databaseURL: "https://platform-499ca-default-rtdb.firebaseio.com",
  projectId: "platform-499ca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.check = async function(){

  let code = document.getElementById("code").value.trim();
  let result = document.getElementById("result");

  if(code === ""){
    result.innerHTML = "من فضلك ادخل الكود";
    result.className = "fail";
    return;
  }

  result.innerHTML = "جاري التحقق...";
  result.className = "";

  try {

    const dbRef = ref(db);
    const snapshot = await get(child(dbRef, `students/${code}`));

    if(snapshot.exists()){
      let data = snapshot.val();

      if(data.status === "تم"){
        result.innerHTML = "✅ تم إنهاء المنصة";
        result.className = "success";
      } else {
        result.innerHTML = "❌ لم يتم الانتهاء من المنصة";
        result.className = "fail";
      }

    } else {
      result.innerHTML = "⚠️ الكود غير موجود";
      result.className = "fail";
    }

  } catch (e) {
    result.innerHTML = "❌ حصل خطأ في الاتصال";
    result.className = "fail";
  }
}
</script>

</body>
</html>
