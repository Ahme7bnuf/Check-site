<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>التحقق من المنصة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e3c72;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .fail {
      color: red;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: white;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>التحقق من المنصة</h2>

    <input type="text" id="code" placeholder="ادخل كود الطالب">
    <br>
    <button onclick="check()">تحقق</button>

    <div id="result"></div>
  </div>

  <footer class="footer">
    © 2026 | All Rights Reserved | Ahmed Khaled
  </footer>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQy9Hucr-a3xr7ovYv3lnPgmPuXr7kY9YcTvfaW1M1uu_OacPWe0Q2qipSnr-KyoFGSKvbXf1n6FYlV/pub?gid=0&single=true&output=csv";

    async function check() {
      let code = document.getElementById("code").value.trim().toUpperCase();
      let result = document.getElementById("result");

      if(code === ""){
        result.innerHTML = "من فضلك ادخل الكود";
        result.className = "fail";
        return;
      }

      result.innerHTML = "جاري التحقق...";
      result.className = "";

      try {
        let response = await fetch(sheetURL);
        let data = await response.text();

        let rows = data.split("\n");
        let found = false;

        for(let i = 1; i < rows.length; i++){
          let cols = rows[i].split(",");
          let sheetCode = (cols[0] || "").trim().toUpperCase();
          let status = (cols[1] || "").trim();

          if(code === sheetCode){
            found = true;

            if(status === "تم"){
              result.innerHTML = "✅ تم إنهاء المنصة";
              result.className = "success";
            } else {
              result.innerHTML = "❌ لم يتم بعد";
              result.className = "fail";
            }

            break;
          }
        }

        if(!found){
          result.innerHTML = "⚠️ الكود غير موجود";
          result.className = "fail";
        }

      } catch (e) {
        result.innerHTML = "❌ حصل خطأ في الاتصال";
        result.className = "fail";
      }
    }
  </script>

</body>
</html>
