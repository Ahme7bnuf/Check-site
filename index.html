<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>التحقق من المنصة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e3c72;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .success { color: green; }
    .fail { color: red; }
  </style>
</head>

<body>

<div class="box">
  <h2>التحقق من المنصة</h2>

  <input type="text" id="code" placeholder="ادخل كود الطالب">
  <br>
  <button onclick="check()">تحقق</button>

  <div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 بيانات مشروعك (جاهزة)
const firebaseConfig = {
  apiKey: "AIzaSyAt6ctdyQgA6yTO6QZGYyCZltO-ZTMEU5w",
  authDomain: "platform-499ca.firebaseapp.com",
  databaseURL: "https://platform-499ca-default-rtdb.firebaseio.com",
  projectId: "platform-499ca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.check = async function(){

  let code = document.getElementById("code").value.trim();
  let result = document.getElementById("result");

  if(code === ""){
    result.innerHTML = "من فضلك ادخل الكود";
    result.className = "fail";
    return;
  }

  result.innerHTML = "جاري التحقق...";
  result.className = "";

  try {

    const dbRef = ref(db);
    const snapshot = await get(child(dbRef, `students/${code}`));

    if(snapshot.exists()){
      let data = snapshot.val();

      if(data.status === "تم"){
        result.innerHTML = "✅ تم إنهاء المنصة";
        result.className = "success";
      } else {
        result.innerHTML = "❌ " + data.status;
        result.className = "fail";
      }

    } else {
      result.innerHTML = "⚠️ الكود غير موجود";
      result.className = "fail";
    }

  } catch (e) {
    result.innerHTML = "❌ حصل خطأ في الاتصال";
    result.className = "fail";
  }
}
</script>

</body>
</html>
