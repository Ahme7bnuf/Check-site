<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>التحقق من المنصة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .success { color: green; }
    .fail { color: red; }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: white;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>التحقق من المنصة</h2>

    <input type="text" id="code" placeholder="ادخل كود الطالب">
    <br>
    <button id="btn" onclick="check()">تحقق</button>

    <div id="result"></div>
  </div>

  <footer class="footer">
    © 2026 | All Rights Reserved | Ahmed Khaled
  </footer>

  <script>
    let requestId = 0;
    let isLoading = false;

    const baseURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQy9Hucr-a3xr7ovYv3lnPgmPuXr7kY9YcTvfaW1M1uu_OacPWe0Q2qipSnr-KyoFGSKvbXf1n6FYlV/pub?gid=0&single=true&output=csv";

    async function check() {
      if (isLoading) return;

      let code = document.getElementById("code").value.trim();
      let result = document.getElementById("result");
      let btn = document.getElementById("btn");

      if(code === ""){
        result.innerHTML = "من فضلك ادخل الكود";
        result.className = "fail";
        return;
      }

      isLoading = true;
      btn.disabled = true;

      requestId++;
      let currentRequest = requestId;

      result.innerHTML = "جاري التحقق...";
      result.className = "";

      const sheetURL = baseURL + "&t=" + Date.now();

      try {
        let response = await fetch(sheetURL, { cache: "no-store" });
        let data = await response.text();

        // تجاهل أي رد قديم
        if(currentRequest !== requestId) return;

        let rows = data.trim().split(/\r?\n/);
        let found = false;

        for(let i = 0; i < rows.length; i++){
          let cols = rows[i].split(",");

          if(cols.length < 2) continue;

          let sheetCode = cols[0].trim();
          let status = cols[1].trim();

          if(code === sheetCode){
            found = true;

            result.innerHTML = (status === "تم")
              ? "✅ تم إنهاء المنصة"
              : "❌ " + status;

            result.className = (status === "تم") ? "success" : "fail";
            break;
          }
        }

        if(!found){
          result.innerHTML = "⚠️ الكود غير موجود";
          result.className = "fail";
        }

      } catch (e) {
        result.innerHTML = "❌ حصل خطأ في الاتصال";
        result.className = "fail";
      }

      isLoading = false;
      btn.disabled = false;
    }
  </script>

</body>
</html>
